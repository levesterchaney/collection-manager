version: '3.9'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-collection_manager}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  qcluster:
    build: ./backend
    command: >
      sh -c "cd /app &&
             python manage.py qcluster --settings=collection_manager.settings.development"
    working_dir: /app
    environment:
      - DJANGO_SETTINGS_MODULE=collection_manager.settings.development
      - PYTHONPATH=/app
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy

  backend:
    build: ./backend
    command: >
      sh -c "python manage.py migrate --settings=collection_manager.settings.development &&
             python manage.py runserver 0.0.0.0:8000 --settings=collection_manager.settings.development"
    working_dir: /app
    environment:
      - DJANGO_SETTINGS_MODULE=collection_manager.settings.development
      - PYTHONPATH=/app
    env_file: .env
    volumes:
      - ./backend:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: builder
    command: npm run dev -- --host
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
      - VITE_GITHUB_CLIENT_ID=${VITE_GITHUB_CLIENT_ID}
    depends_on:
      - backend

volumes:
  postgres_data:
  media_data:
